name: Daily Data Jobs

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 6AM ET (11:00 UTC) — Mon through Fri
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit seen_jobs.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore tokens.json from secret
        run: |
          echo "${{ secrets.LINKEDIN_TOKENS_JSON }}" | base64 -d > storage/tokens.json

      - name: Restore seen_jobs.json from secret (if set)
        # On first run this secret won't exist — that's fine, file already in repo
        run: |
          if [ -n "${{ secrets.SEEN_JOBS_JSON }}" ]; then
            echo "${{ secrets.SEEN_JOBS_JSON }}" | base64 -d > storage/seen_jobs.json
          fi

      - name: Run pipeline
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/seen_jobs.json
          git diff --staged --quiet || (git commit -m "chore: update seen_jobs [skip ci]" && git pull --rebase origin main && git push)
